<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- The app icon as rendered by scripts/make-icon.swift: dark rounded plate
       with a vertical gradient, glowing asterisk (soft halo + bright strokes). -->
